name: Nightly Integration Tests

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch: {}

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: poetry install

      - name: Run integration tests
        env:
          THOA_STAGING_API_URL: https://test-api.thoa.io
          THOA_STAGING_API_KEY: ${{ secrets.THOA_STAGING_API_KEY }}
        run: poetry run pytest tests/integration/ -v --tb=short 2>&1

      - name: Summary
        if: always()
        run: echo "Test run completed at $(date -u)"
